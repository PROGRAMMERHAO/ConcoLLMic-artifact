     - The boyer_moore_search function is called with `params->case_sensitive = false`
     - This causes prepare_bad_char_table to be called with `case_sensitive = false`
     - The condition `if (!case_sensitive)` at line 1122 evaluates to true

  **Summary**: Add the `-i` flag to enable case-insensitive search with a pattern of at least 4 characters that contains alphabetic characters.
