  1. **Command-line Arguments**: The program must be invoked with the `-i` flag (case-insensitive mode):
     - The `-i` flag must be present in the command-line arguments
     - This sets `params.case_sensitive = false`

  2. **File Requirements**:
     - A valid file path must be provided as a command-line argument
     - The file must exist and be readable: `fopen(filename, "r") != NULL`
     - The file must have non-zero size: `file_size > 0`

  3. **Pattern Requirements**:
     - A valid search pattern must be provided (non-empty string)
     - The pattern length must be > 0 and <= MAX_PATTERN_LENGTH (1024 bytes)
     - The pattern should ideally contain at least one alphabetic character to make case-insensitivity meaningful

  4. **Search Algorithm Selection**:
     - NOT using regex mode (no `-E` flag): `params.use_regex = false`
     - Single pattern search (no multiple `-e` flags): `params.num_patterns == 1`
     - The pattern length should be >= 4 bytes to avoid short pattern optimizations that might bypass Boyer-Moore
     - The pattern should not be highly repetitive (to avoid KMP selection)
     - SIMD should not be used (either pattern > SIMD_MAX_PATTERN_LEN or force_no_simd is true)
     
  5. **Execution Flow**:
