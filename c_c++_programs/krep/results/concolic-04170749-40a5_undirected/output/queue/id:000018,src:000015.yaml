  def execute_program(timeout: int) -> tuple[str, int]:
      import signal
      import subprocess
      import tempfile

      # Create file content - can be simple since we're testing pattern length validation
      file_data = "aaaa\nbbbb\n" * 100

      # create a temporary file
      with tempfile.NamedTemporaryFile(mode="w") as temp_file:
          # write file data to file
          temp_file.write(file_data)
          temp_file.flush()
          temp_file_path = temp_file.name
          try:
              # Create a pattern longer than MAX_PATTERN_LENGTH (1024)
              # Using 1025 characters to trigger the validation error at krep.c:2119
              long_pattern = "a" * 1025
              
              # Execute with a pattern that exceeds MAX_PATTERN_LENGTH
              # This satisfies:
              # - argc >= 4 (program + "-e" + pattern + file)
              # - At least one pattern via -e flag
              # - Pattern length > 1024
              # - NOT using regex mode (no -E flag)
              # - NOT using string mode (no -s flag)
              # - NOT using recursive mode (no -r flag)
              result = subprocess.run(
                  ["./krep", "-e", long_pattern, temp_file_path],
                  capture_output=True,
                  encoding="utf-8",
                  errors="replace",
                  timeout=timeout,
              )
              # return stderr and the returncode
              return result.stderr, result.returncode
          except subprocess.TimeoutExpired as e:
              # Timeout occurred, also ensure to return stderr captured before timeout and return code -signal.SIGKILL
              return e.stderr, -signal.SIGKILL
          except Exception as e:
              # ensure to raise the error if run failed
              raise e
