  def execute_program(timeout: int) -> tuple[str, int]:
      import signal
      import subprocess

      # Modified to include a non-existent file argument to trigger file open failure
      # The file "nonexistent_file.bc" should not exist, causing fopen() to return NULL
      commands = ["435 / 4 + 6 - 3421", "quit"]
      input_str = "\n".join(commands) + "\n"

      try:
          # ./bc/bc is interactive! Now invoked with -q flag and a non-existent file
          result = subprocess.run(
              ["./bc/bc", "-q", "nonexistent_file.bc"],
              input=input_str,
              capture_output=True,
              encoding="utf-8",
              errors="replace",
              timeout=timeout,
          )
          # return stderr and the returncode
          return result.stderr, result.returncode
      except subprocess.TimeoutExpired as e:
          # Timeout occurred, also ensure to return stderr captured before timeout and return code -signal.SIGKILL
          return e.stderr, -signal.SIGKILL
      except Exception as e:
          # ensure to raise the error if run failed
          raise e
